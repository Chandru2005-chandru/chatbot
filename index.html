<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-chatbot | CHANDRU</title>

  <!-- Google Fonts for Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button  id="chatbot-toggler">
    <span class="material-symbols-rounded">mode_comment</span>
    <span class="material-symbols-rounded">close</span>
  </button>




  <div class="chatbot-popup">
    <!-- Chatbot Header -->
    <div class="chat-header">
      <div class="header-info">
        <!-- Bot SVG Logo -->
        <svg class="chatbot-logo" width="50" height="50" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <g fill="#212121" fill-rule="nonzero">
            <path d="M17.75,14C18.99,14 20,15.01 20,16.25V17.15C20,18.25 19.52,19.29 18.69,20C17.13,21.34 14.89,22 12,22C9.11,22 6.87,21.34 5.31,20C4.48,19.29 4,18.25 4,17.15V16.25C4,15.01 5.01,14 6.25,14H17.75ZM12,2C12.38,2 12.69,2.28 12.74,2.65L12.75,2.75V3.5H16.25C17.49,3.5 18.5,4.51 18.5,5.75V10.25C18.5,11.49 17.49,12.5 16.25,12.5H7.75C6.51,12.5 5.5,11.49 5.5,10.25V5.75C5.5,4.51 6.51,3.5 7.75,3.5H11.25V2.75C11.25,2.37 11.53,2.06 11.9,2.01L12,2Z"/>
          </g>
        </svg>
        <h2 class="logo-text">CHATBOT</h2>
      </div>
      <button id="close-chatbot" type="button" class="material-symbols-rounded">keyboard_arrow_down</button>
    </div>

    <!-- Chat Body -->
    <div class="chat-body">
      <!-- Bot Message -->
      <div class="message bot-message">
        <svg class="bot-avatar" width="40" height="40" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <g fill="#212121" fill-rule="nonzero">
            <path d="M17.75,14C18.99,14 20,15.01 20,16.25V17.15C20,18.25 19.52,19.29 18.69,20C17.13,21.34 14.89,22 12,22C9.11,22 6.87,21.34 5.31,20C4.48,19.29 4,18.25 4,17.15V16.25C4,15.01 5.01,14 6.25,14H17.75ZM12,2C12.38,2 12.69,2.28 12.74,2.65L12.75,2.75V3.5H16.25C17.49,3.5 18.5,4.51 18.5,5.75V10.25C18.5,11.49 17.49,12.5 16.25,12.5H7.75C6.51,12.5 5.5,11.49 5.5,10.25V5.75C5.5,4.51 6.51,3.5 7.75,3.5H11.25V2.75C11.25,2.37 11.53,2.06 11.9,2.01L12,2Z"/>
          </g>
        </svg>
        <div class="message-text">Hi there, how can I help you today?</div>
      </div>

      
    </div>

    <!-- Chat Footer -->
    <div class="chat-footer">
      <form action="#" class="chat-form">
        <textarea placeholder="Message..." class="message-input" required></textarea>
        <div class="chat-controls">
          <button type="button" id="emoji-picker"  class="material-symbols-rounded">sentiment_satisfied</button>
          <div class="file-upload-wrapper">
            <input type="file" accept="image/*" id="file-input" hidden>
            <img src="#" >
           <button type="button" id="file-upload" class="material-symbols-rounded">attach_file</button> 
           <button type="button" id="file-cancel" class="material-symbols-rounded">close</button> 
           </div> 
          
          <button type="submit" id="send-message" class="material-symbols-rounded">arrow_upward</button>
        </div>
      </form>
    </div>
  </div>



 <!--linking emoji mart sript for emoji picker--> 
 <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>




<script src="script.js"></script>

</body>
</html>
